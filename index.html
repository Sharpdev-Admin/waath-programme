<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WAATH Prog">
<meta name="theme-color" content="#0f1115">
<title>WAATH — Programme Congé Paternité</title>
<style>

:root{--bg:#0f1115;--panel:#171a21;--panel2:#1d212b;--line:#2a2f3a;--txt:#e7e9ee;--muted:#9aa3b2;--accent:#ff5a3c;--accent2:#ffc107;--ok:#3ddc84;--link:#6fb3ff;}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--bg);color:var(--txt);font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;}
a{color:var(--link);}
.sahdr{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;}
.sahdr h1{margin:0;font-size:16px;white-space:nowrap;}
.sahdr .dot{color:var(--accent);}
#prog{display:block !important;padding:18px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));}
@media(max-width:640px){
  #prog{padding:14px 12px;}
  .phdr h2{font-size:19px;}
  .phasestrip{gap:6px;}
  .phase{min-width:calc(50% - 4px);}
  .subtabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;padding-bottom:4px;}
  .subtabs button{white-space:nowrap;}
  .daygrid{grid-template-columns:1fr;}
  .sesscard,.reg,.gtable,.dutable,.durec,.cues,.drills,.progbar{max-width:none;}
  .gtable,.dutable{display:block;overflow-x:auto;}
  .durec input{width:100%;}
}

/* ===== WAATH Programme view (injected) ===== */
.viewtoggle { display:flex; gap:6px; margin-left:4px; }
.viewtoggle button { padding:6px 12px; border-radius:8px; border:1px solid var(--line); background:var(--panel2); color:var(--muted); cursor:pointer; font-size:13px; font-weight:600; white-space:nowrap; }
.viewtoggle button.active { background:var(--accent); color:#000; border-color:var(--accent); }
#prog { grid-column:1 / 3; grid-row:2; overflow-y:auto; padding:22px 28px; display:none; }
body.progmode #tree, body.progmode #pane { display:none; }
body.progmode #prog { display:block; }
body.progmode #search { visibility:hidden; }
.phdr h2 { margin:0 0 4px; font-size:23px; }
.phdr .sub { color:var(--muted); margin-bottom:10px; font-size:14px; }
.chips { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; }
.chip { font-size:11px; padding:3px 9px; border-radius:20px; background:var(--panel2); border:1px solid var(--line); color:var(--muted); }
.reg { border-left:3px solid var(--accent2); background:var(--panel2); padding:9px 14px; border-radius:8px; color:var(--muted); font-size:13px; margin:12px 0 18px; max-width:940px; line-height:1.55; }
.phasestrip { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.phase { flex:1; min-width:155px; border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:var(--panel2); border-top:3px solid var(--line); }
.phase b { display:block; font-size:14px; }
.phase .days { font-size:12px; color:var(--accent2); }
.phase .goal { font-size:12px; color:var(--muted); margin-top:4px; line-height:1.4; }
.subtabs { display:flex; gap:6px; margin:6px 0 16px; flex-wrap:wrap; }
.subtabs button { padding:7px 14px; border-radius:8px; border:1px solid var(--line); background:var(--panel2); color:var(--txt); cursor:pointer; font-size:13px; }
.subtabs button.active { border-color:var(--accent); color:var(--accent); }
.progbar { height:8px; background:#0c0e12; border-radius:4px; overflow:hidden; margin:6px 0 16px; max-width:940px; }
.progbar > i { display:block; height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0; transition:width .3s; }
.daygrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(235px,1fr)); gap:10px; }
.daycard { border:1px solid var(--line); border-radius:10px; background:var(--panel2); padding:10px 12px; cursor:pointer; transition:border-color .15s; }
.daycard:hover { border-color:var(--accent2); }
.daycard.done { border-color:var(--ok); }
.daycard.sel { border-color:var(--accent); }
.daycard .dnum { font-size:12px; color:var(--muted); display:flex; justify-content:space-between; }
.daycard .dtitle { font-weight:600; font-size:14px; margin:4px 0 7px; line-height:1.3; }
.sesschips { display:flex; flex-wrap:wrap; gap:4px; }
.tagbadge { font-size:10px; padding:2px 7px; border-radius:5px; text-transform:uppercase; font-weight:700; letter-spacing:.3px; }
.t-muscu{background:#ff5a3c;color:#000;} .t-force{background:#ffc107;color:#000;}
.t-grip{background:#c792ea;color:#000;} .t-cardio{background:#6fb3ff;color:#000;}
.t-skill{background:#3ddc84;color:#000;} .t-recup{background:#4a5568;color:#fff;}
.t-hopital{background:#8b95a5;color:#000;}
#daydetail { margin-top:16px; }
.detailhdr { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin:6px 0 10px; }
.detailhdr h3 { margin:0; font-size:18px; }
.donebtn { display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border:1px solid var(--line); border-radius:8px; background:var(--panel2); color:var(--txt); cursor:pointer; font-size:14px; }
.donebtn.on { border-color:var(--ok); color:var(--ok); }
.bankfilter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.bankfilter button { padding:5px 12px; border-radius:20px; border:1px solid var(--line); background:var(--panel2); color:var(--muted); cursor:pointer; font-size:12px; }
.bankfilter button.active { border-color:var(--accent); color:var(--txt); background:#222634; }
.sesscard { border:1px solid var(--line); border-radius:10px; background:var(--panel2); margin:8px 0; overflow:hidden; max-width:940px; }
.sesscard > summary { padding:10px 14px; cursor:pointer; list-style:none; display:flex; align-items:center; gap:10px; }
.sesscard > summary::-webkit-details-marker { display:none; }
.sesscard .sname { font-weight:600; flex:1; }
.sesscard .sdur { font-size:12px; color:var(--muted); white-space:nowrap; }
.sblock { padding:0 16px; }
.sblock h5 { margin:10px 0 4px; font-size:13px; color:var(--accent2); }
.sblock ul { margin:0 0 6px; padding-left:18px; }
.sblock li { font-size:13px; margin:2px 0; }
.snote { padding:6px 16px 12px; font-size:12px; color:var(--muted); font-style:italic; }
.gtable, .dutable { border-collapse:collapse; margin:10px 0; width:100%; max-width:940px; }
.gtable td, .gtable th, .dutable td, .dutable th { border:1px solid var(--line); padding:8px 10px; font-size:13px; text-align:left; vertical-align:top; }
.gtable th, .dutable th { background:var(--panel2); color:var(--accent2); }
.durec { display:flex; align-items:center; gap:10px; margin:12px 0; flex-wrap:wrap; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; max-width:940px; }
.durec input { width:90px; padding:7px 9px; border-radius:6px; border:1px solid var(--line); background:var(--bg); color:var(--txt); font-size:14px; }
.durec button { padding:7px 14px; border-radius:8px; border:1px solid var(--accent); background:var(--accent); color:#000; cursor:pointer; font-weight:600; }
.dubest { color:var(--ok); font-weight:700; font-size:16px; }
.duhist { font-size:12px; color:var(--muted); margin-top:6px; }
.cues, .drills { max-width:940px; }
.cues li, .drills li { font-size:13px; margin:3px 0; }
.seclabel { font-size:14px; color:var(--accent2); margin:16px 0 4px; font-weight:600; }
/* video annex */
.vidannex { margin:4px 16px 12px; border:1px solid var(--line); border-radius:8px; background:var(--bg); overflow:hidden; }
.vidannex > summary { padding:8px 12px; cursor:pointer; list-style:none; font-size:13px; color:var(--link); font-weight:600; }
.vidannex > summary::-webkit-details-marker { display:none; }
.vidlist { display:flex; flex-direction:column; gap:4px; padding:4px 10px 8px; }
.vidrow { display:flex; align-items:center; gap:10px; padding:7px 10px; border:1px solid var(--line); border-radius:7px; background:var(--panel2); color:var(--txt); text-decoration:none; }
.vidrow:hover { border-color:var(--accent); background:#222634; }
.vplay { color:var(--accent); font-size:12px; }
.vname { font-size:13px; }
.vidnote { padding:0 12px 10px; font-size:11px; color:var(--muted); font-style:italic; }

</style>
</head>

<script>
/* ===== WAATH Programme view (injected) ===== */
(function(){
"use strict";
const PROG = JSON.parse(document.getElementById("program").textContent);
const PKEY = "waath_prog_v1";
let PS = ploadState();
function ploadState(){ try{ return Object.assign({days:{},du:{}}, JSON.parse(localStorage.getItem(PKEY)||"{}")); }catch(e){ return {days:{},du:{}}; } }
function psave(){ localStorage.setItem(PKEY, JSON.stringify(PS)); }
const pe = s => (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const SMAP = {}; PROG.sessions.forEach(s=>SMAP[s.id]=s);
const TAGLABEL = {muscu:"Muscu",force:"Force",grip:"Grip",cardio:"Cardio",skill:"Skill",recup:"Récup",hopital:"Hôpital"};
const phColor = c => ({gray:"#8b95a5",green:"#3ddc84",blue:"#6fb3ff",orange:"#ff8a3c",purple:"#c792ea"}[c]||"#2a2f3a");

// ---- standalone bootstrap ----
document.body.classList.add("progmode");
const prog = document.getElementById("prog");
let progBuilt=false, curTab="cal", curFilter="all", selDay=null;

function sessionCardHTML(s, open){
  if(!s) return "";
  let h = '<details class="sesscard"'+(open?" open":"")+'><summary>'
    + '<span class="tagbadge t-'+s.tag+'">'+pe(TAGLABEL[s.tag]||s.tag)+'</span>'
    + '<span class="sname">'+pe(s.name)+'</span>'
    + '<span class="sdur">'+pe(s.focus)+' · '+s.duration+"′</span></summary>";
  for(const b of s.blocks){
    h += '<div class="sblock"><h5>'+pe(b.label)+'</h5><ul>';
    for(const it of b.items){ h += '<li>'+pe(it)+'</li>'; }
    h += '</ul></div>';
  }
  if(s.note) h += '<div class="snote">💡 '+pe(s.note)+'</div>';
  if(s.videos && s.videos.length){
    h += '<details class="vidannex"><summary>🎬 Vidéos d\'exécution WAATH ('+s.videos.length+')</summary><div class="vidlist">';
    for(const v of s.videos){
      h += '<a class="vidrow" href="'+pe(v.url)+'" target="_blank" rel="noopener"><span class="vplay">▶</span><span class="vname">'+pe(v.name)+'</span></a>';
    }
    h += '</div><div class="vidnote">Démonstrations issues des programmations WAATH (APEX / Hepburn). Certains mouvements du corps de séance n\'ont pas de vidéo WAATH dédiée et ne sont pas listés ici.</div></details>';
  }
  h += '</details>';
  return h;
}

function buildProg(){
  const m = PROG.meta;
  let h = '<div class="phdr"><h2>'+pe(m.title)+'</h2><div class="sub">'+pe(m.subtitle)+'</div>';
  h += '<div class="chips">'+ m.goals.map(g=>'<span class="chip">🎯 '+pe(g)+'</span>').join("") +'</div>';
  h += '<div class="chips">'+ m.equipment.map(e=>'<span class="chip">'+pe(e)+'</span>').join("") +'</div>';
  h += '<div class="reg">⚖️ '+pe(PROG.regulation)+'</div></div>';
  h += '<div class="phasestrip">';
  for(const p of PROG.phases){
    h += '<div class="phase" style="border-top-color:'+phColor(p.color)+'"><b>'+pe(p.name)+'</b>'
       + '<span class="days">'+pe(p.days)+'</span><div class="goal">'+pe(p.goal)+'</div></div>';
  }
  h += '</div>';
  h += '<div class="subtabs">'
     + '<button data-t="cal" class="active">📅 Calendrier 28 j</button>'
     + '<button data-t="bank">🗂️ Banque de séances</button>'
     + '<button data-t="du">🎯 Double-Unders</button>'
     + '<button data-t="grip">✊ Grip</button></div>';
  h += '<div id="progbody"></div>';
  prog.innerHTML = h;
  prog.querySelectorAll(".subtabs button").forEach(b=>b.onclick=()=>{
    prog.querySelectorAll(".subtabs button").forEach(x=>x.classList.remove("active")); b.classList.add("active");
    curTab=b.dataset.t; renderTab();
  });
  renderTab();
}

function renderTab(){
  const body = document.getElementById("progbody");
  if(curTab==="cal"){ body.innerHTML = calHTML(); wireCal(); }
  else if(curTab==="bank"){ body.innerHTML = bankHTML(); wireBank(); }
  else if(curTab==="du"){ body.innerHTML = duHTML(); wireDu(); }
  else if(curTab==="grip"){ body.innerHTML = gripHTML(); }
}

// ---- Calendar ----
function calHTML(){
  const total = PROG.calendar.length;
  const done = PROG.calendar.filter(d=>PS.days[d.day]).length;
  const pct = Math.round(done/total*100);
  let h = '<div style="color:var(--muted);font-size:13px">Progression : <b style="color:var(--ok)">'+done+'</b> / '+total+' jours · '+pct+'%</div>';
  h += '<div class="progbar"><i style="width:'+pct+'%"></i></div>';
  h += '<div class="daygrid">';
  for(const d of PROG.calendar){
    const ph = PROG.phases.find(p=>p.id===d.phase) || {name:"",color:"gray"};
    const isDone = !!PS.days[d.day];
    h += '<div class="daycard'+(isDone?' done':'')+(selDay===d.day?' sel':'')+'" data-day="'+d.day+'">'
       + '<div class="dnum"><span>J'+d.day+' · <span style="color:'+phColor(ph.color)+'">'+pe(ph.name)+'</span></span><span>'+(isDone?'✓':'')+'</span></div>'
       + '<div class="dtitle">'+pe(d.title)+'</div><div class="sesschips">'
       + d.sessions.map(sid=>{const s=SMAP[sid];return s?'<span class="tagbadge t-'+s.tag+'">'+pe(s.name)+'</span>':'';}).join("")
       + '</div></div>';
  }
  h += '</div><div id="daydetail"></div>';
  return h;
}
function wireCal(){
  prog.querySelectorAll(".daycard").forEach(c=>c.onclick=()=>{
    selDay = parseInt(c.dataset.day,10); showDayDetail();
    prog.querySelectorAll(".daycard").forEach(x=>x.classList.toggle("sel", x===c));
  });
  if(selDay) showDayDetail();
}
function showDayDetail(){
  const d = PROG.calendar.find(x=>x.day===selDay); if(!d) return;
  const det = document.getElementById("daydetail");
  const isDone = !!PS.days[selDay];
  let h = '<div class="detailhdr"><h3>J'+d.day+' — '+pe(d.title)+'</h3>'
        + '<button class="donebtn'+(isDone?' on':'')+'" id="daydone"><span>'+(isDone?'Jour terminé ✓':'Marquer le jour comme fait')+'</span></button></div>';
  for(const sid of d.sessions){ h += sessionCardHTML(SMAP[sid], true); }
  det.innerHTML = h; det.scrollIntoView({block:"nearest"});
  document.getElementById("daydone").onclick=()=>{
    if(PS.days[selDay]) delete PS.days[selDay]; else PS.days[selDay]=true;
    psave(); renderTab();
  };
}

// ---- Session bank ----
function bankHTML(){
  const tags = ["all","muscu","force","grip","cardio","skill","recup","hopital"];
  let h = '<div class="bankfilter">';
  for(const t of tags){ h += '<button data-f="'+t+'"'+(curFilter===t?' class="active"':'')+'>'+(t==="all"?"Toutes":(TAGLABEL[t]||t))+'</button>'; }
  h += '</div><div id="banklist">'+bankListHTML()+'</div>';
  return h;
}
function bankListHTML(){
  const list = PROG.sessions.filter(s=>curFilter==="all"||s.tag===curFilter);
  return list.map(s=>sessionCardHTML(s,false)).join("") || '<p class="empty">Aucune séance.</p>';
}
function wireBank(){
  prog.querySelectorAll(".bankfilter button").forEach(b=>b.onclick=()=>{
    curFilter=b.dataset.f;
    prog.querySelectorAll(".bankfilter button").forEach(x=>x.classList.toggle("active",x===b));
    document.getElementById("banklist").innerHTML = bankListHTML();
  });
}

// ---- Double-Unders ----
function duHTML(){
  const du = PROG.doubleUnder;
  let h = '<div class="reg">Niveau de départ : <b>'+pe(du.current)+'</b>. Objectif fin de cycle : séries de 15-20 double-unders fiables. Travail <b>à froid</b>, en micro-doses quotidiennes.</div>';
  // record tracker
  const best = duBest();
  const today = new Date().toISOString().slice(0,10);
  h += '<div class="seclabel">📈 Ton record d\'enchaînés</div>';
  h += '<div class="durec"><span>Meilleure série du jour :</span>'
     + '<input type="number" id="dunum" min="0" placeholder="ex. 7" value="'+(PS.du[today]||"")+'">'
     + '<button id="dusave">Enregistrer</button>'
     + '<span>Record all-time : <span class="dubest">'+best+'</span> DU</span>'
     + '<div class="duhist" id="duhist">'+duHistHTML()+'</div></div>';
  // weekly goals
  h += '<div class="seclabel">🗓️ Objectifs semaine par semaine</div>';
  h += '<table class="dutable"><tr><th>Semaine</th><th>Focus</th><th>Objectif mesurable</th></tr>';
  for(const w of du.weeks){ h += '<tr><td>S'+w.week+'</td><td>'+pe(w.focus)+'</td><td>'+pe(w.goal)+'</td></tr>'; }
  h += '</table>';
  h += '<div class="seclabel">🪜 Drills progressifs (dans l\'ordre)</div><ol class="drills">';
  for(const d of du.drills){ h += '<li>'+pe(d)+'</li>'; }
  h += '</ol>';
  h += '<div class="seclabel">🎯 Points techniques (cues)</div><ul class="cues">';
  for(const c of du.cues){ h += '<li>'+pe(c)+'</li>'; }
  h += '</ul>';
  return h;
}
function duBest(){ let b=0; for(const k in PS.du){ b=Math.max(b, PS.du[k]||0); } return b; }
function duHistHTML(){
  const keys = Object.keys(PS.du).sort().slice(-7).reverse();
  if(!keys.length) return "Aucun enregistrement pour l'instant.";
  return "Historique : " + keys.map(k=>k.slice(5)+" → "+PS.du[k]).join(" · ");
}
function wireDu(){
  const btn = document.getElementById("dusave"); if(!btn) return;
  btn.onclick=()=>{
    const v = parseInt(document.getElementById("dunum").value,10);
    if(isNaN(v)||v<0) return;
    PS.du[new Date().toISOString().slice(0,10)] = v; psave();
    renderTab();
  };
}

// ---- Grip ----
function gripHTML(){
  let h = '<div class="reg">Grip travaillé sur 3 familles : <b>support/suspension</b> (hangs), <b>crushing</b> (bottoms-up, carries), <b>pinch</b> (sandbag). Placé en fin de séance tirage ou en mini-séance dédiée 2×/semaine.</div>';
  h += '<table class="gtable"><tr><th>Semaine</th><th>Suspension (hang)</th><th>Carry</th><th>Crushing / Pinch</th></tr>';
  for(const g of PROG.gripProgression){
    h += '<tr><td><b>S'+g.week+'</b></td><td>'+pe(g.hang)+'</td><td>'+pe(g.carry)+'</td><td>'+pe(g.other)+'</td></tr>';
  }
  h += '</table>';
  return h;
}

buildProg();

})();
